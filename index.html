<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>SYSTEM OF A DOWN (DELUXE)</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/mobile.css">
    <link rel="stylesheet" href="https://use.typekit.net/ivi2ado.css">
    <link rel="icon" type="image/png" href="img/favicon (3)/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="img/favicon.svg" />
    <link rel="shortcut icon" href="img/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="img/apple-touch-icon.png" />
    <link rel="manifest" href="img/site.webmanifest" />
</head>


<body>
    <!-- Songs Dropdown Menu -->
    <div class="songs-menu">
        <button class="songs-button" id="songsBtn">SONGS</button>
        <div class="songs-dropdown" id="songsList">
            <div class="songs-grid">
                <option class="song-option" data-path="audio/System-Of-A-Down-Sugar-(Official-HD-Video)-(1).mp3">Sugar (Official HD Video)</option>
                <option class="song-option" data-path="audio/Suite-Pee.mp3">Suite Pee</option>
                <option class="song-option" data-path="audio/Know.mp3">Know</option>
                <option class="song-option" data-path="audio/Suggestions.mp3">Suggestions</option>
                <option class="song-option" data-path="audio/Spiders.mp3">Spiders</option>
                <option class="song-option" data-path="audio/DDevil.mp3">DDevil</option>
                <option class="song-option" data-path="audio/Soil.mp3">Soil</option>
                <option class="song-option" data-path="audio/War_.mp3">War?</option>
                <option class="song-option" data-path="audio/Peephole.mp3">Peephole</option>
                <option class="song-option" data-path="audio/CUBErt.mp3">CUBErt</option>
                <option class="song-option" data-path="audio/Darts.mp3">Darts</option>
                <option class="song-option" data-path="audio/P.L.U.C.K..mp3">P.L.U.C.K.</option>
                <option class="song-option" data-path="audio/Sugar(Live-at-Irving-Plaza,NYC,NY-January-1999).mp3">Sugar (Live - 1999)</option>
                <option class="song-option" data-path="audio/War_ (Live-1999).mp3">War? (Live - 1999)</option>
                <option class="song-option" data-path="audio/Suite-Pee(Live-1999).mp3">Suite Pee (Live - 1999)</option>
                <option class="song-option" data-path="audio/Know(Live-1999).mp3">Know (Live - 1999)</option>
                <option class="song-option" data-path="audio/Marmalade.mp3">Marmalade</option>
            </div>
        </div>
    </div>

    <h1>SYSTEM OF A DOWN (DELUXE)</h1>
    <p>Click anywhere to play/pause the music</p>

    <!-- Now Playing Display -->
    <div class="now-playing">
        <p>now playing: <span id="currentSong">Sugar</span></p>
    </div>

    <script src="./js/p5/p5.min.js"></script>
    <script src="./js/p5/addons/p5.sound.min.js"></script>
    <script src="./js/03-waveform.js"></script>
    <script src="./js/mobile-resize.js"></script>
</body>

</html>
